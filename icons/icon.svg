<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9ad7c"/>
      <stop offset="45%" stop-color="#c2925b"/>
      <stop offset="100%" stop-color="#a9743f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#wood)"/>
  <rect x="14" y="14" width="484" height="484" rx="100" fill="none" stroke="#7c4f24" stroke-width="6" opacity="0.5"/>

  <!-- Cabeçalhos -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" fill="#3a2412" text-anchor="middle">
    <text x="150" y="96" font-size="58">Nós</text>
    <text x="362" y="96" font-size="58">Eles</text>
  </g>

  <!-- Coluna esquerda: números + 5 furos -->
  <g fill="#1c120a">
    <circle cx="150" cy="165" r="21"/>
    <circle cx="150" cy="230" r="21"/>
    <circle cx="150" cy="295" r="21"/>
    <circle cx="150" cy="360" r="21"/>
    <circle cx="150" cy="425" r="21"/>
  </g>
  <g fill="#5a3a1d" font-family="Georgia, serif" font-weight="700" font-size="30" text-anchor="middle">
    <text x="92" y="176">1</text>
    <text x="92" y="241">2</text>
    <text x="92" y="306">3</text>
    <text x="92" y="371">4</text>
    <text x="92" y="436">5</text>
  </g>

  <!-- Coluna direita: 5 furos + números -->
  <g fill="#1c120a">
    <circle cx="362" cy="165" r="21"/>
    <circle cx="362" cy="230" r="21"/>
    <circle cx="362" cy="295" r="21"/>
    <circle cx="362" cy="360" r="21"/>
    <circle cx="362" cy="425" r="21"/>
  </g>
  <g fill="#5a3a1d" font-family="Georgia, serif" font-weight="700" font-size="30" text-anchor="middle">
    <text x="420" y="176">1</text>
    <text x="420" y="241">2</text>
    <text x="420" y="306">3</text>
    <text x="420" y="371">4</text>
    <text x="420" y="436">5</text>
  </g>

  <!-- TRUCO vertical no centro -->
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="800" font-size="56"
     text-anchor="middle" fill="#f5f0e6" stroke="#3a2412" stroke-width="3" paint-order="stroke">
    <text x="256" y="180">T</text>
    <text x="256" y="240">R</text>
    <text x="256" y="300">U</text>
    <text x="256" y="360">C</text>
    <text x="256" y="420">O</text>
  </g>
</svg>
